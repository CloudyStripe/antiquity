<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#2E5A88" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1B2A3A" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="Antiquity — learn ancient history in short, rigorous, swipeable modules. Works offline."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Antiquity" />
    <title>Antiquity — Ancient History</title>
  </head>
  <body>
    <div id="app">
      <!-- App-shell splash shown until the Svelte app mounts. -->
      <div class="boot-splash" aria-hidden="true">
        <svg
          class="boot-splash__mark"
          width="84"
          height="84"
          viewBox="0 0 64 64"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <defs>
            <linearGradient id="boot-sky" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#F8F2E7" />
              <stop offset="1" stop-color="#EFE5D2" />
            </linearGradient>
            <clipPath id="boot-tile"><rect width="64" height="64" rx="14" /></clipPath>
          </defs>
          <g clip-path="url(#boot-tile)">
            <rect width="64" height="64" fill="url(#boot-sky)" />
            <rect x="0" y="47" width="64" height="6" fill="#E3CFA2" />
            <rect x="0" y="53" width="64" height="5" fill="#D2B582" />
            <rect x="0" y="58" width="64" height="6" fill="#BD9A63" />
            <path
              d="M32 13 L45 47 H38.6 L35.9 39 H28.1 L25.4 47 H19 L32 13 Z M30 33.2 H34 L32 26.6 Z"
              fill="#2E5A88"
            />
          </g>
        </svg>
      </div>
    </div>
    <noscript>
      <p style="font-family: system-ui; padding: 2rem; text-align: center">
        Antiquity needs JavaScript to run. Please enable it to start learning.
      </p>
    </noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
